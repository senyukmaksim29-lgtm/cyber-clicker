<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Clicker Pro</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle, #1a1a2e 0%, #0f0f1b 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
            border: 1px solid rgba(0, 242, 254, 0.1);
            backdrop-filter: blur(10px);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00f2fe;
            color: #00f2fe;
        }

        .score-box {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 20px 0;
            color: #fff;
            text-shadow: 0 0 15px #2575fc;
        }

        .stats {
            font-size: 0.9rem;
            color: #a0a0c0;
            margin-bottom: 20px;
        }

        /* Головна кнопка */
        .click-btn {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(45deg, #00f2fe, #2575fc);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.5), inset 0 0 15px rgba(255,255,255,0.3);
            transition: transform 0.1s, box-shadow 0.3s;
            outline: none;
            user-select: none;
        }

        .click-btn:active {
            transform: scale(0.92);
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.8);
        }

        /* Магазин апгрейдів */
        .shop {
            margin-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        .shop-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #00f2fe;
        }

        .upgrade-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #2575fc;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upgrade-btn:hover:not(:disabled) {
            background: linear-gradient(45deg, rgba(0,242,254,0.2), rgba(37,117,252,0.2));
            box-shadow: 0 0 10px rgba(37,117,252,0.4);
        }

        .upgrade-btn:disabled {
            border-color: #444;
            color: #666;
            cursor: not-allowed;
        }

        /* Ефект вилітаючих цифр */
        .floating-text {
            position: absolute;
            color: #00f2fe;
            font-weight: bold;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 0 0 8px #00f2fe;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(0.8); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>CYBER CLICKER</h1>
        <div class="stats">За клік: <span id="per-click">1</span> | Авто: <span id="per-sec">0</span>/с</div>
        <div class="score-box" id="score">0 🪙</div>
        
        <button class="click-btn" id="click-target">КЛІК!</button>

        <div class="shop">
            <div class="shop-title">Модифікації</div>
            <button class="upgrade-btn" id="upgrade-click" disabled>
                <span>⚡ Потужний клік (+1)</span>
                <span id="click-cost">15 🪙</span>
            </button>
            <button class="upgrade-btn" id="upgrade-auto" style="margin-top: 10px;" disabled>
                <span>🤖 Авто-майнер (+1/с)</span>
                <span id="auto-cost">50 🪙</span>
            </button>
        </div>
    </div>

    <script>
        // Ініціалізація даних (завантаження з пам'яті браузepa або старт з нуля)
        let data = JSON.parse(localStorage.getItem('cyberClickerData')) || {
            score: 0,
            clickPower: 1,
            autoPower: 0,
            clickCost: 15,
            autoCost: 50
        };

        const scoreEl = document.getElementById('score');
        const perClickEl = document.getElementById('per-click');
        const perSecEl = document.getElementById('per-sec');
        const clickTarget = document.getElementById('click-target');
        const upgradeClickBtn = document.getElementById('upgrade-click');
        const upgradeAutoBtn = document.getElementById('upgrade-auto');
        const clickCostEl = document.getElementById('click-cost');
        const autoCostEl = document.getElementById('auto-cost');

        function updateUI() {
            scoreEl.innerText = Math.floor(data.score) + " 🪙";
            perClickEl.innerText = data.clickPower;
            perSecEl.innerText = data.autoPower;
            clickCostEl.innerText = data.clickCost + " 🪙";
            autoCostEl.innerText = data.autoCost + " 🪙";

            upgradeClickBtn.disabled = data.score < data.clickCost;
            upgradeAutoBtn.disabled = data.score < data.autoCost;
        }

        function saveData() {
            localStorage.setItem('cyberClickerData', JSON.stringify(data));
        }

        // Ефект вилітання цифр "+1"
        function createFloatingText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            document.body.appendChild(el);
            
            setTimeout(() => el.remove(), 800);
        }

        // Клік
        clickTarget.addEventListener('click', (e) => {
            data.score += data.clickPower;
            createFloatingText(e.clientX, e.clientY, `+${data.clickPower}`);
            updateUI();
            saveData();
        });

        // Апгрейд кліку
        upgradeClickBtn.addEventListener('click', () => {
            if (data.score >= data.clickCost) {
                data.score -= data.clickCost;
                data.clickPower += 1;
                data.clickCost = Math.round(data.clickCost * 1.5);
                updateUI();
                saveData();
            }
        });

        // Апгрейд авто-кліку
        upgradeAutoBtn.addEventListener('click', () => {
            if (data.score >= data.autoCost) {
                data.score -= data.autoCost;
                data.autoPower += 1;
                data.autoCost = Math.round(data.autoCost * 1.6);
                updateUI();
                saveData();
            }
        });

        // Автоматичне нарахування кожну секунду (розбите на берсти для плавності)
        setInterval(() => {
            if (data.autoPower > 0) {
                data.score += data.autoPower / 10;
                updateUI();
            }
        }, 100);

        // Регулярне збереження раз на 5 секунд
        setInterval(saveData, 5000);

        // Перший запуск UI
        updateUI();
    </script>
</body>
</html>
